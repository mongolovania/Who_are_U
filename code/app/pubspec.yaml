name: who_are_u
description: "你谁啊 — AI引导式决策助手，以'我之山'见证每一次成长"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # 本地存储
  sqflite: ^2.4.1
  sqlcipher_flutter_libs: ^0.7.0+eol
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.3.1

  # 加密
  encrypt: ^5.0.3
  crypto: ^3.0.6
  pointycastle: ^3.9.1

  # 网络
  http: ^1.2.2
  dio: ^5.7.0

  # 路由
  go_router: ^17.3.0

  # UI
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.0

  # 支付
  in_app_purchase: ^3.2.1

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  logger: ^2.5.0

  # 分享
  share_plus: ^13.1.0
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0

  # 测试
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  sqflite_common_ffi: ^2.3.4+4

  # 分析
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/mountain/
    - assets/images/shadow/
    - assets/images/decorations/
    - assets/animations/shadow_actions/
    - assets/fonts/

  fonts:
    - family: HandDrawn
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
