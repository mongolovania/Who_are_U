# Codemagic CI/CD Configuration for Who_Are_U
# 免费 Apple ID 即可使用 — 不需要付费开发者账号
# Docs: https://docs.codemagic.io/yaml-basics/

workflows:
  # ─── iOS Debug Build（免费 Apple ID，日常调试用）─────────────────
  ios-debug:
    name: iOS Debug — 免费签名
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: code/app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test --no-pub || echo "⚠️ 部分测试未通过，继续构建..."
        ignore_failure: true
      - name: Build iOS Debug IPA（免费签名，7天有效）
        script: |
          flutter build ipa --debug \
            --export-method development \
            --build-name=0.1.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - code/app/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - $NOTIFY_EMAIL
        notify:
          success: true
          failure: true

  # ─── iOS Release Build（付费开发者账号，上架用）─────────────────
  ios-release:
    name: iOS Release — App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: code/app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'release/*'
          include: true
      tag_patterns:
        - pattern: 'ios-v*'
          include: true
    cache:
      cache_paths:
        - ~/.pub-cache
    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get
      - name: Run Flutter tests
        script: flutter test --no-pub
        ignore_failure: false
      - name: Build iOS Release IPA
        script: |
          flutter build ipa --release \
            --export-method app-store \
            --build-name=0.1.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - code/app/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        submit_to_testflight: true
      email:
        recipients:
          - $NOTIFY_EMAIL
        notify:
          success: true
          failure: true
